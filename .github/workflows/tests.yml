name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    env:
      GOOGLE_GENAI_USE_VERTEXAI: "TRUE"
      GOOGLE_CLOUD_PROJECT: "trustable-ai-100mph"
      GOOGLE_CLOUD_LOCATION: "us-central1"
      BIGQUERY_JOB_PROJECT: "trustable-ai-100mph"
      RUN_BIGQUERY_INTEGRATION_TESTS: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest
